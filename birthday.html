<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Днем Рождения!</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --accent: #ff2d55; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: var(--bg); overflow: hidden; font-family: sans-serif; color: white; }
        /* Защитный экран */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            text-align: center; visibility: hidden;
        }
        #player-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; opacity: 0; z-index: 10; }
        .tap-zone { position: absolute; top: 0; width: 30%; height: 80%; z-index: 20; -webkit-tap-highlight-color: transparent; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
        .skip-indicator { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; font-weight: bold; pointer-events: none; opacity: 0; z-index: 30; }
        #skip-left { left: 10%; }
        #skip-right { right: 10%; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; opacity: 0; transition: opacity 0.3s ease; }
        .progress-container { display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
        input[type="range"] { flex-grow: 1; -webkit-appearance: none; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; }
        .buttons-row { display: flex; align-items: center; justify-content: center; gap: 30px; }
        .icon-btn { background: none; border: none; fill: white; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; padding: 0; -webkit-tap-highlight-color: transparent; }
        .icon-btn:active { transform: scale(0.85); }
        .icon-btn.small { width: 28px; height: 28px; opacity: 0.8; }
        #end-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; opacity: 0; pointer-events: none; text-align: center; }
        #end-screen h1 { font-size: 2.2rem; margin-bottom: 10px; padding: 0 20px; }
        #end-screen p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 30px; padding: 0 20px; }
        #replay-btn { padding: 15px 35px; background: var(--accent); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(255, 45, 85, 0.4); }
        svg { width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div>
            <h1>Еще рано... 🤫</h1>
            <p>Возвращайся 26 апреля!</p>
        </div>
    </div>

    <div id="player-container">
        <div id="left-zone" class="tap-zone"></div>
        <div id="right-zone" class="tap-zone"></div>
        
        <div id="skip-left" class="skip-indicator">-5 сек</div>
        <div id="skip-right" class="skip-indicator">+5 сек</div>

        <video id="main-video" playsinline preload="metadata">
            <source src="vids/greeting.mp4" type="video/mp4">
        </video>

        <div id="controls">
            <div class="progress-container">
                <span id="time-current">0:00</span>
                <input type="range" id="progress-bar" value="0" step="0.1" min="0" max="100">
                <span id="time-total">0:00</span>
            </div>
            <div class="buttons-row">
                <button class="icon-btn small" id="back-5">
                    <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05 1-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
                </button>
                
                <button class="icon-btn" id="play-pause-btn">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>

                <button class="icon-btn small" id="forward-5">
                    <svg viewBox="0 0 24 24"><path d="M11.5 8c2.65 0 5.05 1 6.9 2.6L22 7v9h-9l3.62-3.62c-1.39-1.16-3.16-1.88-5.12-1.88-3.54 0-6.55 2.31-7.6 5.5l-2.37-.78C2.92 11.03 6.85 8 11.5 8z"/></svg>
                </button>
                
                <button class="icon-btn small" id="mute-btn" style="position: absolute; right: 20px;">
                    <svg id="icon-vol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                    <svg id="icon-mute" viewBox="0 0 24 24" style="display: none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3z"/></svg>
                </button>
            </div>
        </div>

        <div id="end-screen">
            <h1>Это всё для тебя ❤️</h1>
            <p>Спасибо, что ты есть.</p>
            <button id="replay-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>

            </button>
        </div>
    </div>

    <script>
        window.onload = () => {

            const now = new Date();
            // ВНИМАНИЕ: Для теста сейчас можно закомментировать этот блок!
            // Месяц 3 = Апрель
            if (!(now.getMonth() === 3 && now.getDate() === 22 && now.getFullYear() === 2026)) {
                // Если хочешь потестить прямо сейчас, закомментируй строку ниже:
                document.getElementById('lock-screen').style.visibility = 'visible';
                return;
            }

            const video = document.getElementById('main-video');
            const controls = document.getElementById('controls');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const muteBtn = document.getElementById('mute-btn');
            const progressBar = document.getElementById('progress-bar');
            const timeCurrent = document.getElementById('time-current');
            const timeTotal = document.getElementById('time-total');
            const endScreen = document.getElementById('end-screen');
            
            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');
            const iconVol = document.getElementById('icon-vol');
            const iconMute = document.getElementById('icon-mute');

            gsap.to(video, { opacity: 1, duration: 1.5, ease: "power2.out" });
            gsap.to(controls, { opacity: 1, duration: 1, delay: 0.5 });

            const formatTime = (time) => {
                if (isNaN(time) || time === Infinity) return "0:00";
                const m = Math.floor(time / 60);
                const s = Math.floor(time % 60);
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            // --- ОБНОВЛЕННАЯ ЛОГИКА ВРЕМЕНИ ---
            
            // 1. Слушаем изменение длительности (самый надежный способ для мобилок)
            video.addEventListener('durationchange', () => {
                if (!isNaN(video.duration) && video.duration > 0) {
                    timeTotal.textContent = formatTime(video.duration);
                }
            });

            // 2. Обновление ползунка и текущего времени
            video.addEventListener('timeupdate', () => {
                if (!isNaN(video.duration) && video.duration > 0) {
                    // Рассчитываем процент (0-100)
                    const percentage = (video.currentTime / video.duration) * 100;
                    progressBar.value = percentage;
                    timeCurrent.textContent = formatTime(video.currentTime);
                    
                    // Дополнительная проверка: если справа всё еще 0:00, пробуем обновить
                    if (timeTotal.textContent === "0:00") {
                        timeTotal.textContent = formatTime(video.duration);
                    }
                }
            });

            // 3. Перемотка ползунком (из процентов обратно в секунды)
            progressBar.addEventListener('input', () => {
                if (!isNaN(video.duration)) {
                    const time = (progressBar.value / 100) * video.duration;
                    video.currentTime = time;
                }
            });

            const togglePlay = () => {
                if (video.paused || video.ended) {
                    video.play();
                    iconPlay.style.display = 'none';
                    iconPause.style.display = 'block';
                } else {
                    video.pause();
                    iconPlay.style.display = 'block';
                    iconPause.style.display = 'none';
                }
            };
            
            playPauseBtn.addEventListener('click', togglePlay);
            video.addEventListener('click', togglePlay);

            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                iconVol.style.display = video.muted ? 'none' : 'block';
                iconMute.style.display = video.muted ? 'block' : 'none';
            });

            const skipTime = (amount, indicatorId) => {
                if (!isNaN(video.duration)) {
                    video.currentTime = Math.max(0, Math.min(video.currentTime + amount, video.duration));
                    if (indicatorId) {
                        const el = document.getElementById(indicatorId);
                        gsap.fromTo(el, { opacity: 1, y: "-50%", scale: 1 }, { opacity: 0, y: "-80%", scale: 1.2, duration: 0.6 });
                    }
                }
            };

            document.getElementById('back-5').addEventListener('click', () => skipTime(-5));
            document.getElementById('forward-5').addEventListener('click', () => skipTime(5));

            document.addEventListener('keydown', (e) => {
                if (video.ended && e.key !== 'Enter') return; 
                if (e.key === 'ArrowRight') skipTime(5, 'skip-right');
                else if (e.key === 'ArrowLeft') skipTime(-5, 'skip-left');
                else if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); togglePlay(); }
            });

            let lastTapTime = 0;
            const handleDoubleTap = (e, amount, indicatorId) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTapTime;
                if (tapLength < 300 && tapLength > 0) {
                    skipTime(amount, indicatorId);
                    e.preventDefault();
                }
                lastTapTime = currentTime;
            };

            document.getElementById('left-zone').addEventListener('click', (e) => handleDoubleTap(e, -5, 'skip-left'));
            document.getElementById('right-zone').addEventListener('click', (e) => handleDoubleTap(e, 5, 'skip-right'));

            video.addEventListener('ended', () => {
                progressBar.value = 100;
                timeCurrent.textContent = formatTime(video.duration);
                gsap.to(controls, { opacity: 0, pointerEvents: 'none', duration: 0.5 });
                gsap.to(endScreen, { opacity: 1, pointerEvents: 'auto', duration: 1 });
            });

            document.getElementById('replay-btn').addEventListener('click', () => {
                gsap.to(endScreen, { opacity: 0, pointerEvents: 'none', duration: 0.5 });
                gsap.to(controls, { opacity: 1, pointerEvents: 'auto', duration: 0.5 });
                video.currentTime = 0;
                togglePlay();
            });
        };
    </script>
</body>
</html>
